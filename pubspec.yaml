name: clicker
description: 跨平台连点器
publish_to: "none"
version: 1.2.1+1

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  fluent_ui: ^4.8.6
  flutter_acrylic: ^1.1.3
  google_fonts: ^6.2.1

  # State management
  provider: ^6.1.1

  # Storage
  path_provider: ^2.1.1
  file_picker: ^8.0.0

  # Platform
  window_manager: ^0.4.3
  win32: ^5.5.4
  ffi: ^2.1.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.2.1
  collection: ^1.18.0
  path: ^1.9.0
  http: ^1.2.0
  archive: ^4.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
