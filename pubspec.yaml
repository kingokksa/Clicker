name: clicker
description: 跨平台连点器
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  fluent_ui: ^4.9.1
  flutter_acrylic: ^1.1.3
  google_fonts: ^8.1.0

  # State management
  provider: ^6.1.1

  # Storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  file_picker: ^12.0.0-beta.4

  # Platform
  window_manager: ^0.5.1
  win32: ^6.3.0
  ffi: ^2.1.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.2.1
  collection: ^1.18.0
  path: ^1.9.0
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
