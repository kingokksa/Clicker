name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4.3.0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Package
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "Clicker-${tag}-windows-x64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: windows-release
          path: Clicker-*.zip

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.3.0

      - uses: actions/download-artifact@v4.3.0
        with:
          name: windows-release

      - name: Create Release
        uses: softprops/action-gh-release@v2.3.2
        with:
          generate_release_notes: true
          files: Clicker-*.zip
